name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Configure git for tests
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
      - name: Lint
        run: ruff check claude_swarm tests
      - name: Type-check
        run: mypy claude_swarm
      - name: Test
        run: pytest --cov=claude_swarm --cov-report=term-missing --cov-fail-under=80
